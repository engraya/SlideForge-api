version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - OUTPUT_DIR=/app/generated
      - RATE_LIMIT_PER_MINUTE=10
      - MAX_SLIDES=20
      - FILE_TTL_SECONDS=3600
    volumes:
      - generated_files:/app/generated
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  generated_files:
    driver: local
